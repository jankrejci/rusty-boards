name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check-commits:
    name: Commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitlint
        run: pip install gitlint

      - name: Validate commit messages
        run: gitlint --commits origin/main..HEAD

  firmware:
    name: Firmware (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate: [boards/temp-sensor/firmware, boards/voltage-meter/firmware]
    defaults:
      run:
        working-directory: ${{ matrix.crate }}
    steps:
      - uses: actions/checkout@v4

      # Nightly is required for build-std (building core from source for
      # riscv32imc-unknown-none-elf). Local dev uses stable with the
      # [unstable] Cargo key, which enables the same feature.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-02-01
          targets: riscv32imc-unknown-none-elf
          components: rustfmt, clippy, rust-src, llvm-tools

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release --locked

  server:
    name: Server (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate: [tools/sensor-server]
    defaults:
      run:
        working-directory: ${{ matrix.crate }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install libudev
        run: sudo apt-get install -y libudev-dev

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --locked -- -D warnings

      - name: Build
        run: cargo build --locked

      - name: Test
        run: cargo test --locked
